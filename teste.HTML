<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteiro de Entregas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d1a21; 
            color: #fff; 
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 25px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 {
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); 
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #e0e0e0;
        }
        
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            font-size: 16px;
            color: #fff;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        input:focus {
            outline: none;
            border-color: #3498db;
            background: rgba(255, 255, 255, 0.15);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }
        
        button:hover {
            background-color: #2980b9;
        }
        
        .btn-excluir {
            background-color: rgba(231, 76, 60, 0.8);
            width: auto;
            padding: 6px 12px;
            font-size: 14px;
            float: right;
            margin-top: -5px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-excluir:hover {
            background-color: #c0392b;
        }
        
        .btn-limpar-tudo {
            background-color: rgba(231, 76, 60, 0.8);
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-limpar-tudo:hover {
            background-color: #c0392b;
        }

        .lista-container {
            margin-top: 30px;
        }
        
        .header-lista {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); 
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        
        .header-lista h3 {
            margin: 0;
            color: #fff;
        }

        .card-entrega {
            background: rgba(0, 0, 0, 0.2); 
            padding: 15px;
            margin-bottom: 10px;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            overflow: hidden; 
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .card-entrega p {
            margin: 5px 0;
            color: #ecf0f1;
        }
        
        .destaque {
            font-weight: bold;
            color: #e74c3c;
            font-size: 18px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        
        .texto-vazio {
            text-align: center; 
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚚 Novo Roteiro de Entrega</h2>
        
        <form id="formEntrega">
            <div class="form-group">
                <label for="nome">Nome do Destinatário:</label>
                <input type="text" id="nome" placeholder="Ex: João Silva" required>
            </div>
            <div class="form-group">
                <label for="endereco">Endereço de Entrega:</label>
                <input type="text" id="endereco" placeholder="Ex: Rua das Flores, 123" required>
            </div>
            <div class="form-group">
                <label for="quantidade">Quantidade de Peças (Opcional):</label>
                <input type="number" id="quantidade" min="1" placeholder="Padrão: 1">
            </div>
            
            <button type="submit">Adicionar ao Roteiro</button>
        </form>

        <div class="lista-container">
            <div class="header-lista">
                <h3>📋 Lista por Endereços</h3>
            </div>
            
            <button id="btnLimparTudo" class="btn-limpar-tudo" style="display: none;">🗑️ Limpar Toda a Lista</button>

            <div id="areaLista">
                <p class="texto-vazio">Nenhuma entrega cadastrada ainda.</p>
            </div>
        </div>
    </div>

    <script>
        let entregas = {};

        document.getElementById('formEntrega').addEventListener('submit', function(evento) {
            evento.preventDefault();

            let nome = document.getElementById('nome').value.trim();
            let endereco = document.getElementById('endereco').value.trim();
            
            let campoQuantidade = document.getElementById('quantidade').value;
            let quantidade = campoQuantidade === "" ? 1 : parseInt(campoQuantidade);

            let chaveEndereco = endereco.toUpperCase();

            if (entregas[chaveEndereco]) {
                entregas[chaveEndereco].quantidade += quantidade;
                
                if (!entregas[chaveEndereco].nomes.includes(nome)) {
                    entregas[chaveEndereco].nomes.push(nome);
                }
            } else {
                entregas[chaveEndereco] = {
                    nomes: [nome],
                    enderecoOriginal: endereco,
                    quantidade: quantidade
                };
            }

            atualizarTela();
            
            this.reset();
            document.getElementById('nome').focus();
        });

        function apagarEntrega(chave) {
            if (confirm("Deseja realmente remover este endereço do roteiro?")) {
                delete entregas[chave];
                atualizarTela();
            }
        }

        document.getElementById('btnLimparTudo').addEventListener('click', function() {
            if (confirm("Atenção! Isso vai apagar TODAS as entregas cadastradas. Deseja continuar?")) {
                entregas = {};
                atualizarTela();
            }
        });

        function atualizarTela() {
            let areaLista = document.getElementById('areaLista');
            let btnLimparTudo = document.getElementById('btnLimparTudo');
            areaLista.innerHTML = '';

            let locais = Object.keys(entregas);

            if (locais.length === 0) {
                areaLista.innerHTML = '<p class="texto-vazio">Nenhuma entrega cadastrada ainda.</p>';
                btnLimparTudo.style.display = 'none';
                return;
            }

            btnLimparTudo.style.display = 'block';

            locais.forEach(function(chave) {
                let dados = entregas[chave];
                let nomesFormatados = dados.nomes.join(', ');

                let divCard = document.createElement('div');
                divCard.className = 'card-entrega';
                
                divCard.innerHTML = `
                    <button class="btn-excluir" onclick="apagarEntrega('${chave}')">Excluir</button>
                    <p><strong>Endereço:</strong> ${dados.enderecoOriginal}</p>
                    <p><strong>Destinatário(s):</strong> ${nomesFormatados}</p>
                    <p><strong>Total de Peças:</strong> <span class="destaque">${dados.quantidade}</span></p>
                `;
                
                areaLista.appendChild(divCard);
            });
        }
    </script>

</body>
</html>
